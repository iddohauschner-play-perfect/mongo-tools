name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine version and commit
        id: version
        run: |
          COMMIT=$(git rev-parse HEAD)
          # get-version relies on git describe which needs tags.
          # Fall back to the short commit hash when no tags exist.
          VERSION=$(go run release/release.go get-version 2>/dev/null || echo "dev-${COMMIT:0:8}")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Cross-compile all targets
        env:
          CGO_ENABLED: "0"
        run: |
          TOOLS="bsondump mongodump mongorestore mongoimport mongoexport mongostat mongotop mongofiles"
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="${{ steps.version.outputs.commit }}"

          declare -A TARGETS
          TARGETS=(
            ["linux-amd64"]="linux amd64 "
            ["linux-arm64"]="linux arm64 "
            ["macos-arm64"]="darwin arm64 "
            ["windows-amd64"]="windows amd64 .exe"
          )

          for target in "${!TARGETS[@]}"; do
            read -r goos goarch ext <<< "${TARGETS[$target]}"

            LDFLAGS="-X main.VersionStr=${VERSION} -X main.GitCommit=${COMMIT}"
            if [ "$goos" = "windows" ]; then
              LDFLAGS="$LDFLAGS -s -w"
            fi

            echo "::group::Building $target"
            mkdir -p "dist/${target}"
            for tool in $TOOLS; do
              GOOS=$goos GOARCH=$goarch go build \
                -o "dist/${target}/${tool}${ext}" \
                -ldflags "$LDFLAGS" \
                -tags failpoints \
                "${tool}/main/${tool}.go"
            done
            echo "::endgroup::"
          done

      - name: List built binaries
        run: find dist -type f | sort

      - name: Create release archives
        run: |
          mkdir -p _archives
          for dir in dist/*/; do
            target=$(basename "$dir")
            if [[ "$target" == *windows* ]]; then
              (cd "$dir" && zip -r "../../_archives/mongo-tools-${target}.zip" .)
            else
              tar -czf "_archives/mongo-tools-${target}.tar.gz" -C "$dir" .
            fi
          done
          ls -lh _archives/

      - name: Upload linux-amd64
        uses: actions/upload-artifact@v4
        with:
          name: mongo-tools-linux-amd64
          path: dist/linux-amd64/

      - name: Upload linux-arm64
        uses: actions/upload-artifact@v4
        with:
          name: mongo-tools-linux-arm64
          path: dist/linux-arm64/

      - name: Upload macos-arm64
        uses: actions/upload-artifact@v4
        with:
          name: mongo-tools-macos-arm64
          path: dist/macos-arm64/

      - name: Upload windows-amd64
        uses: actions/upload-artifact@v4
        with:
          name: mongo-tools-windows-amd64
          path: dist/windows-amd64/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            _archives/*
